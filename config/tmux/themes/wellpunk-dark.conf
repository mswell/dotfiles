# Vantablack theme — based on basecamp/omarchy + indigo accent (#6366f1)
set -g status-style                "bg=#000000,fg=#ffffff"
set -g status-left                 "#[fg=#6366f1,bold] #S  "
set -g status-right                "#[fg=#8d8d8d] %H:%M "
set -g status-left-length          30
set -g status-right-length         20
set -g window-status-format        "#[fg=#8d8d8d] #I:#W "
set -g window-status-current-format "#[fg=#6366f1,bold] #I:#W "
set -g window-status-separator     ""
set -g window-status-activity-style "fg=#fcd34d,bold"
set -g window-status-bell-style     "fg=#fcd34d,bold,blink"
set -g window-status-last-style     "fg=#cecece"
set -g pane-border-style           "fg=#404040"
set -g pane-active-border-style    "fg=#6366f1"
set -g message-style               "bg=#000000,fg=#6366f1"
set -g message-command-style       "bg=#000000,fg=#8d8d8d"
set -g mode-style                  "bg=#6366f1,fg=#ffffff"
