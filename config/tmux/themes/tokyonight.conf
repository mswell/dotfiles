# Tokyo Night theme
set -g status-style                "bg=#1a1b26,fg=#c0caf5"
set -g status-left                 "#[fg=#c0caf5,bold] #S  "
set -g status-right                "#[fg=#565f89] %H:%M "
set -g status-left-length          30
set -g status-right-length         20
set -g window-status-format        "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
set -g window-status-separator     ""
set -g pane-border-style           "fg=#3b4261"
set -g pane-active-border-style    "fg=#7aa2f7"
set -g message-style               "bg=#1a1b26,fg=#c0caf5"
set -g message-command-style       "bg=#1a1b26,fg=#565f89"
set -g mode-style                  "bg=#7aa2f7,fg=#1a1b26"
