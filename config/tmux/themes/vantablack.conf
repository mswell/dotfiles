# Vantablack theme — based on basecamp/omarchy
set -g status-style                "bg=#000000,fg=#ffffff"
set -g status-left                 "#[fg=#ffffff,bold] #S  "
set -g status-right                "#[fg=#8d8d8d] %H:%M "
set -g status-left-length          30
set -g status-right-length         20
set -g window-status-format        "#[fg=#8d8d8d] #I:#W "
set -g window-status-current-format "#[fg=#ffffff,bold] #I:#W "
set -g window-status-separator     ""
set -g pane-border-style           "fg=#404040"
set -g pane-active-border-style    "fg=#8d8d8d"
set -g message-style               "bg=#000000,fg=#ffffff"
set -g message-command-style       "bg=#000000,fg=#8d8d8d"
set -g mode-style                  "bg=#8d8d8d,fg=#000000"
