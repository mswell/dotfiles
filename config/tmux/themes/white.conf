# White theme — based on basecamp/omarchy
set -g status-style                "bg=#ffffff,fg=#000000"
set -g status-left                 "#[fg=#000000,bold] #S  "
set -g status-right                "#[fg=#6e6e6e] %H:%M "
set -g status-left-length          30
set -g status-right-length         20
set -g window-status-format        "#[fg=#6e6e6e] #I:#W "
set -g window-status-current-format "#[fg=#000000,bold] #I:#W "
set -g window-status-separator     ""
set -g pane-border-style           "fg=#c0c0c0"
set -g pane-active-border-style    "fg=#6e6e6e"
set -g message-style               "bg=#ffffff,fg=#000000"
set -g message-command-style       "bg=#ffffff,fg=#6e6e6e"
set -g mode-style                  "bg=#6e6e6e,fg=#ffffff"
