# White theme — based on basecamp/omarchy + indigo accent (#4f46e5)
set -g status-style                "bg=#ffffff,fg=#000000"
set -g status-left                 "#[fg=#4f46e5,bold] #S  "
set -g status-right                "#[fg=#6e6e6e] %H:%M "
set -g status-left-length          30
set -g status-right-length         20
set -g window-status-format        "#[fg=#6e6e6e] #I:#W "
set -g window-status-current-format "#[fg=#4f46e5,bold] #I:#W "
set -g window-status-separator     ""
set -g window-status-activity-style "fg=#6366f1,bold"
set -g window-status-bell-style     "fg=#6366f1,bold,blink"
set -g window-status-last-style     "fg=#3a3a3a"
set -g pane-border-style           "fg=#c0c0c0"
set -g pane-active-border-style    "fg=#4f46e5"
set -g message-style               "bg=#ffffff,fg=#4f46e5"
set -g message-command-style       "bg=#ffffff,fg=#6e6e6e"
set -g mode-style                  "bg=#4f46e5,fg=#ffffff"
