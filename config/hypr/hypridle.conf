general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice to turn on the display.
}

listener {
    timeout = 60                                 # 1min.
    on-timeout = sh -c '[ "$(cat /sys/class/power_supply/AC/online)" = "0" ] && brightnessctl -s set 5'  # dim only on battery
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

# Warn
listener {
    timeout = 540                     # 9 min
    on-timeout = notify-send " You are idle!"               # command to run when timeout has passed
    on-resume = notify-send  " Oh! you're Back" " Hello !!!"  # command to run when activity is detected after timeout has fired.
}

listener {
    timeout = 600                                 # 10min
    on-timeout = sh -c '[ "$(cat /sys/class/power_supply/AC/online)" = "0" ] && loginctl lock-session'  # lock only on battery
}

