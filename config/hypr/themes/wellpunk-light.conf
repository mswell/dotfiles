# White theme — based on basecamp/omarchy
# https://github.com/basecamp/omarchy/tree/dev/themes/white

$cursor_theme  = Bibata-Modern-Ice
$icon_theme    = Papirus-Light

$background      = rgb(ffffff)
$foreground      = rgb(000000)
$accent          = rgb(6e6e6e)
$accent2         = rgb(3a3a3a)
$indigo          = rgb(4f46e5)
$indigo_soft     = rgb(6366f1)
$inactive_border = rgb(c0c0c0)

$active_border_1 = rgb(4f46e5)
$active_border_2 = rgb(6366f1)

# Hyprlock semantic aliases
$base     = $background
$text     = $foreground
$surface0 = rgb(e0e0e0)
$red      = rgb(1a1a1a)
$yellow   = rgb(fcd34d)
$mauve    = $accent

# Alpha variants (for hyprlock placeholders)
$baseAlpha    = ffffff
$textAlpha    = 000000
$accentAlpha  = 6e6e6e
