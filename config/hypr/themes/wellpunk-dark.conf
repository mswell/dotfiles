# Vantablack theme — based on basecamp/omarchy
# https://github.com/basecamp/omarchy/tree/dev/themes/vantablack

$cursor_theme  = Bibata-Modern-Classic
$icon_theme    = Papirus-Dark

$background      = rgb(000000)
$foreground      = rgb(ffffff)
$accent          = rgb(8d8d8d)
$accent2         = rgb(cecece)
$indigo          = rgb(6366f1)
$indigo_soft     = rgb(818cf8)
$inactive_border = rgb(404040)

$active_border_1 = rgb(6366f1)
$active_border_2 = rgb(818cf8)

# Hyprlock semantic aliases
$base     = $background
$text     = $foreground
$surface0 = rgb(1a1a1a)
$red      = rgb(a4a4a4)
$yellow   = rgb(fcd34d)
$mauve    = $accent

# Alpha variants (for hyprlock placeholders)
$baseAlpha    = 000000
$textAlpha    = ffffff
$accentAlpha  = 8d8d8d
